<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 / 登录 - 谭sir的个人网站</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="d7a13b04-1505-419a-add0-85c84ff18758"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <a href="./index.html">首页</a>
        <a href="./about.html">关于我</a>
        <a href="./projects.html">我的项目</a>
        <a href="./contact.html">联系我</a>
        <a href="./login.html">注册 / 登录</a>
        <button class="theme-toggle" type="button" onclick="toggleTheme()" id="themeToggle" aria-label="切换深色模式">
            🌙 深色模式
        </button>
    </nav>

    <section class="auth">
        <h2>用户中心</h2>

        <input
            type="email"
            id="authEmail"
            placeholder="请输入邮箱"
            autocomplete="email"
        >

        <input
            type="password"
            id="authPassword"
            placeholder="请输入密码，至少 6 位"
            autocomplete="current-password"
        >

        <div class="auth-buttons">
            <button type="button" onclick="registerUser()">注册</button>
            <button type="button" onclick="loginUser()">登录</button>
        </div>

        <button type="button" id="logoutButton" onclick="logoutUser()" hidden>退出登录</button>
        <p id="authMessage"></p>
    </section>

    <script src="./script.js"></script>
</body>
</html>
