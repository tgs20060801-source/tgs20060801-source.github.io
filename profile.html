<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 谭sir的个人网站</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="d7a13b04-1505-419a-add0-85c84ff18758"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <a href="./index.html">首页</a>
        <a href="./about.html">关于我</a>
        <a href="./projects.html">我的项目</a>
        <a href="./contact.html">联系我</a>
        <a href="./login.html">注册 / 登录</a>
        <button class="theme-toggle" type="button" onclick="toggleTheme()" id="themeToggle" aria-label="切换深色模式">
            🌙 深色模式
        </button>
    </nav>

    <section class="profile-page">
        <div class="profile-card">
            <img id="profileAvatar" class="profile-avatar" src="./avatar.jpg" alt="用户头像">
            <h2 id="profileNickname">加载中...</h2>
            <p id="profileEmail">加载中...</p>
            <p id="profileCreatedAt">注册时间：加载中...</p>

            <div class="profile-upload-box">
                <input
                    id="avatarUploadInput"
                    class="avatar-upload-input"
                    type="file"
                    accept="image/jpeg,image/png,image/webp"
                >
                <button id="avatarUploadButton" type="button" onclick="uploadSelectedAvatar()">上传头像</button>
            </div>

            <button id="profileLogoutButton" type="button" onclick="logoutUser()">退出登录</button>
            <p id="profileMessage"></p>
        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
