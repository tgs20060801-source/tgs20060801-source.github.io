        <div class="comment-board">

            <form id="commentForm" class="comment-form">
                <label class="comment-label" for="commentName">昵称</label>

                <textarea id="commentMessage" class="comment-textarea" rows="5" placeholder="写下你的留言..." maxlength="500" required></textarea>

                <button type="submit" class="comment-submit">提交留言</button>
                <p id="commentStatus" class="comment-status"></p>
            </form>

            <div id="commentsList" class="comments-list"></div>
        </div>
