<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - 谭sir的个人网站</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="d7a13b04-1505-419a-add0-85c84ff18758"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <a href="./index.html">首页</a>
        <a href="./about.html">关于我</a>
        <a href="./projects.html">我的项目</a>
        <a href="./contact.html">联系我</a>
        <a href="./login.html">注册 / 登录</a>
        <button class="theme-toggle" type="button" onclick="toggleTheme()" id="themeToggle" aria-label="切换深色模式">
            🌙 深色模式
        </button>
    </nav>

    <section class="contact">
        <h2>联系我</h2>
        <p>欢迎和我交流编程、数据分析以及数学建模。</p>
        <p>邮箱：<a href="mailto:2796753954@qq.com">2796753954@qq.com</a></p>

        <div style="margin-top: 28px; padding: 20px; border: 1px solid #d0d7de; border-radius: 12px; background: rgba(255,255,255,0.85); max-width: 720px;">
            <h3 style="margin-top: 0; margin-bottom: 16px;">留言板</h3>

            <form id="commentForm" style="display: grid; gap: 12px;">
                <label for="commentName" style="font-weight: 600;">昵称</label>
                <input id="commentName" type="text" placeholder="请输入昵称" maxlength="50" required style="padding: 10px 12px; border: 1px solid #c7d2e0; border-radius: 8px;">

                <label for="commentMessage" style="font-weight: 600;">留言内容</label>
                <textarea id="commentMessage" rows="5" placeholder="写下你的留言..." maxlength="500" required style="padding: 10px 12px; border: 1px solid #c7d2e0; border-radius: 8px; resize: vertical;"></textarea>

                <button type="submit" style="padding: 10px 16px; border: none; border-radius: 8px; background: #1f6feb; color: #fff; cursor: pointer; width: fit-content;">提交留言</button>
                <p id="commentStatus" style="margin: 0; min-height: 1.5em;"></p>
            </form>

            <div id="commentsList" style="margin-top: 24px; display: grid; gap: 12px;"></div>
        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
